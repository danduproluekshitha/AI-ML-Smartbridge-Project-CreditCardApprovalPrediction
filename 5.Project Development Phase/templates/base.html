<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Ledger — Credit Screening{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="ledger-frame">
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand-mark">§</span>
        <span class="brand-name">Ledger</span>
      </a>
      <nav class="topnav">
        <a href="/">Application</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/sandbox">Sandbox</a>
        <a href="/notifications">Review Queue</a>
      </nav>
    </header>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
    <footer class="footer">
      <span>Ledger — automated credit screening demo · scikit-learn models · not a real lending decision</span>
    </footer>
  </div>
</body>
</html>
